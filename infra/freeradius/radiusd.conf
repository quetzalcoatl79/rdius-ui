# ──────────────────────────────────────────────────────────────────────────────
# radiusd.conf — FreeRADIUS 3.2.x main configuration
# This file is mounted at /etc/freeradius/3.0/radiusd.conf inside each container
#
# Extends the FreeRADIUS default config with SQL module enabled.
# The official Docker image provides defaults for all unspecified directives.
# ──────────────────────────────────────────────────────────────────────────────

# Prefix must match the compiled-in default for the Docker image
prefix = /usr

# Log to stdout for Docker container visibility
log {
    destination = stdout
    colourise = yes
    timestamp = yes
    file = /dev/null
    syslog_facility = daemon
    stripped_names = no
    auth = yes
    auth_badpass = no
    auth_goodpass = no
}

# Allow 3 simultaneous sessions per user by default
max_request_time = 30
cleanup_delay = 5
max_requests = 16384

# Include default FreeRADIUS configuration directories
$INCLUDE clients.conf
$INCLUDE proxy.conf
$INCLUDE policy.d/
$INCLUDE sites-enabled/
$INCLUDE mods-enabled/
