# clients.conf — Static RADIUS clients
# Dynamic clients (managed via Radius UI) are loaded from the SQL `nas` table.
# Keep only localhost for internal testing — all other clients come from SQL.

# Localhost — for local radclient testing inside the container
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}
